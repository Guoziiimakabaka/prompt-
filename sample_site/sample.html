<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>静态站点示例页面</title>
  </head>
  <body>
    <header>
      <h1>Prompt 编写示例站点</h1>
      <nav>首页 | 文档 | 联系我们</nav>
    </header>
    <main>
      <article>
        <h2>功能简介</h2>
        <p>
          这是用于验证正文提取 API 的静态页面。页面内容包含标题、段落和列表，
          方便测试提取后的 JSON 是否可被大模型直接解析。
        </p>
        <ul>
          <li>支持通过 URL 抓取网页内容。</li>
          <li>返回结构化 JSON，正文文本为主。</li>
          <li>可用于后续大模型问答与摘要。</li>
        </ul>
      </article>
    </main>
    <footer>Copyright 2026</footer>
  </body>
</html>
